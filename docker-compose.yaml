services:
  chroma:
    image: chromadb/chroma:latest
    container_name: sherlock-chroma
    ports:
      - "8000:8000"
    volumes:
      - chroma_data:/chroma/chroma
    command:
      - run
      - --host
      - 0.0.0.0
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "bash", "-c", "echo -e 'GET /api/v2/heartbeat HTTP/1.0\\r\\nHost: localhost\\r\\n\\r\\n' > /dev/tcp/localhost/8000"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 20s

  searxng:
    image: searxng/searxng:latest
    container_name: sherlock-searxng
    ports:
      - "8888:8080"
    volumes:
      - ./searxng:/etc/searxng
    environment:
      - SEARXNG_BASE_URL=http://localhost:8888
      - SEARXNG_SECRET_KEY=sherlock-searxng-local-only
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/healthz"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

  # Custom Sherlock web app — replaces OpenWebUI
  # Runs directly on host with the project venv (not containerized yet)
  # To run: cd ~/Sherlock && venv/bin/python web/main.py

volumes:
  chroma_data:
