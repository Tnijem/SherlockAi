services:
  ollama:
    image: ollama/ollama:latest
    container_name: sherlock-ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    environment:
      - OLLAMA_FLASH_ATTENTION=1
      - OLLAMA_MAX_LOADED_MODELS=2
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "ollama", "list"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 40s

  chroma:
    image: chromadb/chroma:latest
    container_name: sherlock-chroma
    ports:
      - "8000:8000"
    volumes:
      - ./data/chroma_persist:/chroma
    command:
      - run
      - --host
      - 0.0.0.0
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "bash", "-c", "echo -e 'GET /api/v2/heartbeat HTTP/1.0\\r\\nHost: localhost\\r\\n\\r\\n' > /dev/tcp/localhost/8000"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 20s

  searxng:
    image: searxng/searxng:latest
    container_name: sherlock-searxng
    ports:
      - "8888:8080"
    volumes:
      - ./searxng:/etc/searxng
    environment:
      - SEARXNG_BASE_URL=http://localhost:8888
      - SEARXNG_SECRET_KEY=sherlock-searxng-local-only
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/healthz"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

volumes:
  ollama_data:

