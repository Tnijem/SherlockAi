# SearXNG settings for Sherlock — local research mode
# Air-gapped-friendly: only enable engines that don't require accounts

use_default_settings: true

general:
  debug: false
  instance_name: "Sherlock Research"
  privacypolicy_url: false
  donation_url: false
  contact_url: false
  enable_metrics: false

search:
  safe_search: 0
  autocomplete: ""
  default_lang: "en"
  formats:
    - html
    - json   # required for API use

server:
  port: 8080
  bind_address: "0.0.0.0"
  secret_key: "sherlock-searxng-local-only"
  base_url: "http://localhost:8888"
  image_proxy: false
  http_protocol_version: "1.0"

ui:
  static_use_hash: true
  default_locale: "en"
  query_in_title: false
  infinite_scroll: false
  center_alignment: false
  default_theme: simple
  theme_args:
    simple_style: dark

# Enabled engines — legal/public research focus
engines:
  - name: google
    engine: google
    shortcut: g
    disabled: false

  - name: bing
    engine: bing
    shortcut: b
    disabled: false

  - name: duckduckgo
    engine: duckduckgo
    shortcut: d
    disabled: false

  - name: wikipedia
    engine: wikipedia
    shortcut: wp
    disabled: false

  - name: google scholar
    engine: google_scholar
    shortcut: gs
    disabled: false

  - name: semantic scholar
    engine: semantic_scholar
    shortcut: ss
    disabled: false

outgoing:
  request_timeout: 15.0
  max_request_timeout: 30.0
  useragent_suffix: ""
  pool_connections: 100
  pool_maxsize: 20
  enable_http2: true
