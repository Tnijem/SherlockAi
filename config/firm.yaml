# Sherlock firm configuration.
#
# This file identifies the firm installing Sherlock and the jurisdictions + practice
# areas it covers. The ingestion pipeline reads this file to decide which primary-law
# corpus to pull in. Retrieval reads it to scope queries to the firm's jurisdictions.
#
# To add a new state: drop a matching config/jurisdictions/<CODE>.yaml file, then add
# the code to `jurisdictions` below. No code changes required.

firm:
  name: "Dennis Law"
  primary_jurisdiction: GA
  jurisdictions:
    - GA
    - FL
  practice_areas:
    - personal_injury
    - contracts
    - civil_procedure
    - estates
  case_law:
    lookback_years: 10
    max_per_court: 2000   # safety cap when pulling from CourtListener

  # ── Email & Calendar monitoring (Office 365 / Microsoft Graph API) ──────
  # Sherlock uses a dedicated service account to read attorney mailboxes and
  # calendars via delegated permissions. See docs/INSTALL.md for setup.
  #
  # IMPORTANT: Do NOT put client_secret here. Set the SHERLOCK_O365_SECRET
  # environment variable instead (in start.sh or launchd plist).
  email:
    provider: office365
    tenant_id: "CHANGEME"                    # Azure AD tenant ID
    client_id: "CHANGEME"                    # App registration client ID
    # client_secret: set SHERLOCK_O365_SECRET env var
    service_account: "sherlock@dennislaw.com" # Sherlock's own O365 mailbox
    monitored_mailboxes:
      - "sam@dennislaw.com"
    # Poll intervals (seconds). Override via EMAIL_POLL / CALENDAR_POLL env vars.
    email_poll_interval: 120     # check email every 2 min
    calendar_poll_interval: 600  # check calendar every 10 min
    calendar_lookahead_days: 60  # how far ahead to scan for events
