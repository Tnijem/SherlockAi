&lt;svg width="400" height="200" viewBox="0 0 400 200" xmlns="http://www.w3.org/2000/svg"&gt;
  &lt;!-- Background gradient --&gt;
  &lt;defs&gt;
    &lt;linearGradient id="bgGrad" x1="0%" y1="0%" x2="0%" y2="100%"&gt;
      &lt;stop offset="0%" stop-color="#1E40AF"/&gt;
      &lt;stop offset="60%" stop-color="#1E3A8A"/&gt;
    &lt;/linearGradient&gt;
  &lt;/defs&gt;
  &lt;rect width="400" height="200" rx="20" fill="url(#bgGrad)"/&gt;
  &lt;!-- Scales Icon --&gt;
  &lt;g transform="translate(80, 40) scale(0.8)" fill="none" stroke="#FCD34D" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"&gt;
    &lt;!-- Beam --&gt;
    &lt;rect x="0" y="0" width="120" height="6" rx="3" fill="#FCD34D"/&gt;
    &lt;!-- Pivot --&gt;
    &lt;circle cx="60" cy="12" r="8" fill="#FCD34D"/&gt;
    &lt;!-- Left chain &amp; pan --&gt;
    &lt;path d="M35 12 Q30 30 35 45" /&gt;
    &lt;circle cx="35" cy="55" r="20" stroke="#FCD34D" stroke-width="3" fill="none"/&gt;
    &lt;circle cx="35" cy="42" r="12" fill="#FFFFFF" stroke="#FCD34D" stroke-width="2"/&gt;
    &lt;!-- Right chain &amp; pan --&gt;
    &lt;path d="M85 12 Q90 30 85 45" /&gt;
    &lt;circle cx="85" cy="55" r="20" stroke="#FCD34D" stroke-width="3" fill="none"/&gt;
    &lt;circle cx="85" cy="42" r="12" fill="#3B82F6" stroke="#FCD34D" stroke-width="2"/&gt;
  &lt;/g&gt;
  &lt;!-- Text --&gt;
  &lt;text x="200" y="110" font-family="system-ui, -apple-system, sans-serif" font-size="32" font-weight="700" text-anchor="middle" fill="#FFFFFF" letter-spacing="0.5"&gt;Sherlock&lt;/text&gt;
  &lt;text x="200" y="145" font-family="system-ui, -apple-system, sans-serif" font-size="32" font-weight="700" text-anchor="middle" fill="#FCD34D" letter-spacing="0.5"&gt;Law AI&lt;/text&gt;
  &lt;text x="200" y="175" font-family="system-ui, -apple-system, sans-serif" font-size="14" text-anchor="middle" fill="#93C5FD"&gt;Offline RAG for Law Firms&lt;/text&gt;
&lt;/svg&gt;