&lt;svg width="1200" height="600" viewBox="0 0 1200 600" xmlns="http://www.w3.org/2000/svg"&gt;
  &lt;rect width="1200" height="600" fill="#F8FAFC"/&gt;
  &lt;text x="600" y="60" font-family="system-ui, -apple-system, sans-serif" font-size="48" font-weight="700" text-anchor="middle" fill="#1E40AF"&gt;Sherlock Law AI&lt;/text&gt;
  &lt;text x="600" y="100" font-family="system-ui, -apple-system, sans-serif" font-size="24" text-anchor="middle" fill="#64748B"&gt;Color Palette&lt;/text&gt;
  &lt;!-- Primary Blue --&gt;
  &lt;rect x="80" y="140" width="200" height="200" rx="20" fill="#1E40AF"/&gt;
  &lt;text x="320" y="170" font-family="system-ui, -apple-system, sans-serif" font-size="24" font-weight="600" fill="#1E40AF"&gt;Primary&lt;/text&gt;
  &lt;text x="320" y="205" font-family="system-ui, monospace" font-size="20" fill="#475569"&gt;#1E40AF&lt;/text&gt;
  &lt;!-- Primary Dark --&gt;
  &lt;rect x="340" y="140" width="200" height="200" rx="20" fill="#1E3A8A"/&gt;
  &lt;text x="580" y="170" font-family="system-ui, -apple-system, sans-serif" font-size="24" font-weight="600" fill="#1E3A8A"&gt;Primary Dark&lt;/text&gt;
  &lt;text x="580" y="205" font-family="system-ui, monospace" font-size="20" fill="#475569"&gt;#1E3A8A&lt;/text&gt;
  &lt;!-- Primary Light --&gt;
  &lt;rect x="600" y="140" width="200" height="200" rx="20" fill="#3B82F6"/&gt;
  &lt;text x="840" y="170" font-family="system-ui, -apple-system, sans-serif" font-size="24" font-weight="600" fill="#3B82F6"&gt;Primary Light&lt;/text&gt;
  &lt;text x="840" y="205" font-family="system-ui, monospace" font-size="20" fill="#475569"&gt;#3B82F6&lt;/text&gt;
  &lt;!-- Accent Gold --&gt;
  &lt;rect x="860" y="140" width="200" height="200" rx="20" fill="#FCD34D"/&gt;
  &lt;text x="1100" y="170" font-family="system-ui, -apple-system, sans-serif" font-size="24" font-weight="600" fill="#92400E"&gt;Accent&lt;/text&gt;
  &lt;text x="1100" y="205" font-family="system-ui, monospace" font-size="20" fill="#475569"&gt;#FCD34D&lt;/text&gt;
  &lt;!-- Dark Gray --&gt;
  &lt;rect x="80" y="380" width="140" height="140" rx="20" fill="#111827"/&gt;
  &lt;text x="260" y="420" font-family="system-ui, -apple-system, sans-serif" font-size="20" font-weight="600" fill="#F9FAFB"&gt;Dark Gray&lt;/text&gt;
  &lt;text x="260" y="450" font-family="system-ui, monospace" font-size="16" fill="#D1D5DB"&gt;#111827&lt;/text&gt;
  &lt;!-- Light BG --&gt;
  &lt;rect x="260" y="380" width="140" height="140" rx="20" fill="#F8FAFC"/&gt;
  &lt;text x="440" y="420" font-family="system-ui, -apple-system, sans-serif" font-size="20" font-weight="600" fill="#334155"&gt;Light BG&lt;/text&gt;
  &lt;text x="440" y="450" font-family="system-ui, monospace" font-size="16" fill="#64748B"&gt;#F8FAFC&lt;/text&gt;
  &lt;!-- White --&gt;
  &lt;rect x="440" y="380" width="140" height="140" rx="20" fill="#FFFFFF" stroke="#E2E8F0" stroke-width="2"/&gt;
  &lt;text x="620" y="420" font-family="system-ui, -apple-system, sans-serif" font-size="20" font-weight="600" fill="#334155"&gt;White&lt;/text&gt;
  &lt;text x="620" y="450" font-family="system-ui, monospace" font-size="16" fill="#64748B"&gt;#FFFFFF&lt;/text&gt;
&lt;/svg&gt;